# =============================================================================
#  SEED Platform — Alertmanager Configuration v0.27
#  Routage et regroupement des alertes Prometheus
#  Institut Sénégalais de Recherches Agricoles (ISRA) / CNRA Bambey
# =============================================================================

global:
  # Durée pendant laquelle une alerte résolue reste visible
  resolve_timeout: 5m

  # ── Email (configurer avec un vrai SMTP en production) ──────────────────
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertes@isra.sn'
  # smtp_auth_username: 'alertes@isra.sn'
  # smtp_auth_password: 'VOTRE_MOT_DE_PASSE'
  # smtp_require_tls: true

# =============================================================================
#  TEMPLATES
# =============================================================================
templates:
  - '/etc/alertmanager/templates/*.tmpl'

# =============================================================================
#  ROUTAGE PRINCIPAL
# =============================================================================
route:
  # Délai avant envoi de la première notification (aggrégation initiale)
  group_wait:      30s
  # Délai avant envoi d'une nouvelle alerte dans un groupe existant
  group_interval:  5m
  # Délai avant renvoi si l'alerte n'est pas résolue
  repeat_interval: 4h
  # Regrouper par plateforme + sévérité
  group_by: ['platform', 'severity', 'component']
  # Receiver par défaut
  receiver: 'seed-log'

  # ── Règles de routage par sévérité ────────────────────────────────────
  routes:
    # Alertes critiques → notification immédiate (group_wait court)
    - match:
        severity: critical
      receiver: 'seed-critical'
      group_wait: 10s
      repeat_interval: 1h
      continue: false

    # Alertes warning → receiver standard
    - match:
        severity: warning
      receiver: 'seed-warning'
      group_wait: 1m
      repeat_interval: 6h
      continue: false

    # Alertes infrastructure → regroupement spécifique
    - match_re:
        component: 'database|message-broker|iam'
      receiver: 'seed-infrastructure'
      group_by: ['component', 'severity']
      group_wait: 20s
      continue: false

# =============================================================================
#  INHIBITIONS — Éviter les cascades d'alertes redondantes
# =============================================================================
inhibit_rules:
  # Si un service est DOWN (critical), inhiber les alertes warning du même service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['job', 'component']

  # Si PostgreSQL est DOWN, inhiber les alertes de connexions/rollbacks
  - source_match:
      alertname: 'PostgreSQLDown'
    target_match_re:
      alertname: 'PostgreSQL.*'
    equal: ['component']

  # Si Keycloak est DOWN, inhiber les alertes de login failures
  - source_match:
      alertname: 'KeycloakDown'
    target_match_re:
      alertname: 'Keycloak.*'
    equal: ['component']

# =============================================================================
#  RECEIVERS
# =============================================================================
receivers:

