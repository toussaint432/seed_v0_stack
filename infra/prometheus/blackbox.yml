# =============================================================================
#  SEED Platform — Blackbox Exporter Configuration
#  Probe HTTP/HTTPS des endpoints de santé de tous les services
# =============================================================================
modules:

  # Probe HTTP générique — attend un code 2xx
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 204]
      method: GET
      follow_redirects: true
      fail_if_not_ssl: false
      preferred_ip_protocol: "ip4"
      ip_protocol_fallback: false

  # Probe Spring Boot Actuator Health — vérifie le statut UP dans le JSON
  http_actuator_health:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200]
      method: GET
      follow_redirects: true
      fail_if_body_not_matches_regexp:
        - '"status":"UP"'
      preferred_ip_protocol: "ip4"

  # Probe TCP — vérifie qu'un port est ouvert (PostgreSQL, Kafka)
  tcp_connect:
    prober: tcp
    timeout: 5s
    tcp:
      preferred_ip_protocol: "ip4"
