services:
  postgres:
    image: postgres:16
    container_name: seed-postgres
    environment:
      POSTGRES_DB: seed
      POSTGRES_USER: seed
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seed}
    ports:
      - "5432:5432"
    volumes:
      - seed_pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seed -d seed"]
      interval: 5s
      timeout: 5s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:25.0.4
    container_name: seed-keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KC_DB: dev-file
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: 8080

      # ✅ rend l'issuer stable (évite mismatch entre localhost vs keycloak)
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: "edge"
      KC_HTTP_ENABLED: "true"
      # Métriques & health exposés sur le port de management 9000
      KC_METRICS_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      # Heap borné : 384m max évite de saturer le cgroup 1100m (G1GC + metaspace + CodeCache).
      # -XX:ReservedCodeCacheSize=64m réduit l'empreinte mémoire off-heap.
      JAVA_OPTS_APPEND: "-Xms128m -Xmx384m -XX:MaxMetaspaceSize=180m -XX:ReservedCodeCacheSize=64m -XX:+UseG1GC"

    ports:
      - "18080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import:ro
    mem_limit: 1100m
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: seed-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_MAX_CLIENT_CNXNS: 60
      # JVM — limité pour un ZK single-node en dev
      KAFKA_HEAP_OPTS: "-Xms64m -Xmx128m"
    mem_limit: 256m

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: seed-kafka
    depends_on:
      - zookeeper
    ports:
      - "19092:9092"
      - "29092:29092"
    environment:
      # ── Identité & connectivité ────────────────────────────────────────
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # ── Réplication & partitions ───────────────────────────────────────
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_MIN_INSYNC_REPLICAS: 1
      # ── Rétention des messages (7 jours / 1 GB) ───────────────────────
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 536870912
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      # ── Taille et compression ──────────────────────────────────────────
      KAFKA_MESSAGE_MAX_BYTES: 1048576
      KAFKA_COMPRESSION_TYPE: producer
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DELETE_TOPIC_ENABLE: "true"
      # ── Performance réseau ─────────────────────────────────────────────
      KAFKA_NUM_NETWORK_THREADS: 3
      KAFKA_NUM_IO_THREADS: 8
      KAFKA_SOCKET_SEND_BUFFER_BYTES: 102400
      KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: 102400
      KAFKA_SOCKET_REQUEST_MAX_BYTES: 104857600
      # ── JMX — exposition des métriques broker pour le JMX Exporter ────
      KAFKA_JMX_PORT: 9999
      KAFKA_JMX_HOSTNAME: kafka
      # ── JVM — G1GC, limité pour dev sur M1 ────────────────────────────
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx512m"
      KAFKA_JVM_PERFORMANCE_OPTS: >-
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=20
        -XX:InitiatingHeapOccupancyPercent=35
        -XX:+ExplicitGCInvokesConcurrent
        -XX:MaxInlineLevel=15
    mem_limit: 768m

  kafka-jmx-exporter:
    image: sscaling/jmx-prometheus-exporter
    container_name: seed-kafka-jmx
    environment:
      CONFIG_YML: "/etc/jmx_exporter/config.yml"
      JVM_OPTS: "-Xms32m -Xmx64m"
    volumes:
      - ./infra/kafka/jmx-exporter-kafka.yml:/etc/jmx_exporter/config.yml:ro
    depends_on:
      - kafka
    mem_limit: 128m

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    container_name: seed-kafka-exporter
    command:
      - "--kafka.server=kafka:29092"
      - "--kafka.version=3.1.0"
      - "--group.filter=.*"
      - "--topic.filter=.*"
      - "--web.listen-address=:9308"
      - "--log.level=warn"
    depends_on:
      - kafka
    mem_limit: 64m

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: seed-kafka-ui
    depends_on:
      - kafka
    ports:
      - "18085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: "SEED — Bus de messages"
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_METRICS_PORT: 9999
      KAFKA_CLUSTERS_0_AUDIT_TOPICAUDITENABLED: "false"
      DYNAMIC_CONFIG_ENABLED: "true"
      LOGGING_LEVEL_ROOT: warn
      JAVA_OPTS: "-Xms48m -Xmx160m -XX:MaxMetaspaceSize=96m -XX:+UseG1GC -XX:TieredStopAtLevel=1"
    mem_limit: 320m

  # ✅ Base env commun (optionnel mais propre)
  catalog-service:
    build: ./services/catalog-service
    container_name: seed-catalog
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seed
      SPRING_DATASOURCE_USERNAME: seed
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-seed}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/seed-v0/protocol/openid-connect/certs
      # Mémoire augmentée — catalog est schema owner (Flyway V1-V9, migrations lourdes)
      JAVA_TOOL_OPTIONS: "-Xms64m -Xmx256m -XX:MaxMetaspaceSize=128m -XX:+UseG1GC -XX:TieredStopAtLevel=1"
      # Flyway : réessaie 10x si Postgres répond lentement au démarrage
      SPRING_FLYWAY_CONNECT_RETRIES: "10"
      # Kafka : ne pas crasher si un topic n'existe pas encore au démarrage
      SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    ports:
      - "18081:8080"

  lot-service:
    build: ./services/lot-service
    container_name: seed-lot
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seed
      SPRING_DATASOURCE_USERNAME: seed
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-seed}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/seed-v0/protocol/openid-connect/certs
      JAVA_TOOL_OPTIONS: "-Xms48m -Xmx192m -XX:MaxMetaspaceSize=160m -XX:+UseG1GC -XX:TieredStopAtLevel=1"
      SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "18082:8080"

  stock-service:
    build: ./services/stock-service
    container_name: seed-stock
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seed
      SPRING_DATASOURCE_USERNAME: seed
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-seed}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/seed-v0/protocol/openid-connect/certs
      JAVA_TOOL_OPTIONS: "-Xms48m -Xmx192m -XX:MaxMetaspaceSize=160m -XX:+UseG1GC -XX:TieredStopAtLevel=1"
      SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "18083:8080"

  order-service:
    build: ./services/order-service
    container_name: seed-order
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
      kafka:
        condition: service_started
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/seed
      SPRING_DATASOURCE_USERNAME: seed
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-seed}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/seed-v0/protocol/openid-connect/certs
      JAVA_TOOL_OPTIONS: "-Xms48m -Xmx192m -XX:MaxMetaspaceSize=160m -XX:+UseG1GC -XX:TieredStopAtLevel=1"
      SPRING_KAFKA_LISTENER_MISSING_TOPICS_FATAL: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    ports:
      - "18084:8080"

  frontend:
    build: ./frontend
    container_name: seed-frontend
    restart: on-failure:3
    depends_on:
      keycloak:
        condition: service_started
      catalog-service:
        condition: service_healthy
      lot-service:
        condition: service_healthy
      stock-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    environment:
      VITE_API_BASE: http://localhost
      VITE_KEYCLOAK_URL: http://localhost:18080
      VITE_KEYCLOAK_REALM: seed-v0
      VITE_KEYCLOAK_CLIENT_ID: seed-frontend
    ports:
      - "5173:5173"


  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: seed-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://seed:${POSTGRES_PASSWORD:-seed}@postgres:5432/seed?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: seed-blackbox
    command:
      - '--config.file=/etc/blackbox/blackbox.yml'
    volumes:
      - ./infra/prometheus/blackbox.yml:/etc/blackbox/blackbox.yml:ro

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: seed-alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--log.level=info'
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - seed_alertmanager_data:/alertmanager
    ports:
      - "19093:9093"

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: seed-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/prometheus/rules:/etc/prometheus/rules:ro
      - seed_prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--storage.tsdb.retention.size=2GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--log.level=info'
    ports:
      - "19090:9090"
    depends_on:
      - catalog-service
      - lot-service
      - stock-service
      - order-service
      - keycloak
      - postgres-exporter
      - kafka-exporter
      - blackbox-exporter
      - alertmanager

  grafana:
    image: grafana/grafana:10.4.3
    container_name: seed-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_USERS_DEFAULT_THEME: dark
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/seed-platform-overview.json
      GF_PANELS_DISABLE_SANITIZE_HTML: "true"
      GF_FEATURE_TOGGLES_ENABLE: "publicDashboards"
      GF_DATE_FORMATS_DEFAULT_TIMEZONE: Africa/Dakar
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/provisioning/dashboards:/var/lib/grafana/dashboards:ro
      - seed_grafana_data:/var/lib/grafana
    ports:
      - "13000:3000"
    depends_on:
      - prometheus
      - alertmanager

volumes:
  seed_pgdata:
  seed_grafana_data:
  seed_prometheus_data:
  seed_alertmanager_data:
